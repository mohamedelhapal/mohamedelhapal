<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الأدمن</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">MyPortfolio</a>
                </div>
                
                <div class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </div>
                
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html" data-translate="home">الرئيسية</a></li>
                    <li><a href="about.html" data-translate="about">نبذة عني</a></li>
                    <li><a href="index.html#projects" data-translate="projects">المشاريع</a></li>
                    <li><a href="index.html#contact" data-translate="contact">اتصل بنا</a></li>
                    <li class="mobile-only">
                        <div class="theme-toggler">
                            <button class="theme-btn active" onclick="toggleTheme('light')" data-translate="light">فاتح</button>
                            <button class="theme-btn" onclick="toggleTheme('dark')" data-translate="dark">مظلم</button>
                        </div>
                    </li>
                    <li class="mobile-only">
                        <div class="lang-switcher">
                            <button class="lang-btn active" onclick="changeLanguage('ar')">العربية</button>
                            <button class="lang-btn" onclick="changeLanguage('en')">English</button>
                        </div>
                    </li>
                </ul>
                
                <div class="header-controls">
                    <div class="theme-toggler desktop-only">
                        <button class="theme-btn active" onclick="toggleTheme('light')" data-translate="light">فاتح</button>
                        <button class="theme-btn" onclick="toggleTheme('dark')" data-translate="dark">مظلم</button>
                    </div>
                    
                    <div class="lang-switcher desktop-only">
                        <button class="lang-btn active" onclick="changeLanguage('ar')">العربية</button>
                        <button class="lang-btn" onclick="changeLanguage('en')">English</button>
                    </div>
                    
                    <div class="auth-buttons" id="authButtons"></div>
                </div>
            </div>
        </div>
    </header>
    
    <main>
        <div class="admin-container">
            <div class="admin-header">
                <h1 data-translate="adminPanel">لوحة التحكم</h1>
            </div>
            
            <div class="admin-stats">
                <div class="stat-card">
                    <h3 id="totalUsers">0</h3>
                    <p data-translate="totalUsers">إجمالي المستخدمين</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalProjects">0</h3>
                    <p data-translate="totalProjects">إجمالي المشاريع</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalMessages">0</h3>
                    <p data-translate="totalMessages">إجمالي الرسائل</p>
                </div>
            </div>
            
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="switchTab('users-tab')" data-translate="users">المستخدمين</button>
                <button class="tab-btn" onclick="switchTab('projects-tab')" data-translate="projects">المشاريع</button>
                <button class="tab-btn" onclick="switchTab('messages-tab')" data-translate="messages">الرسائل</button>
            </div>
            
            <div id="users-tab" class="tab-content active">
                <div id="adminUsersList" class="users-grid"></div>
            </div>
            
            <div id="projects-tab" class="tab-content">
                <div class="add-project-form">
                    <h3 data-translate="addProject">إضافة مشروع جديد</h3>
                    <form id="addProjectForm">
                        <div class="form-group">
                            <label data-translate="projectTitleAr">العنوان (عربي)</label>
                            <input type="text" id="projectTitleAr" required>
                        </div>
                        <div class="form-group">
                            <label data-translate="projectTitleEn">العنوان (إنجليزي)</label>
                            <input type="text" id="projectTitleEn" required>
                        </div>
                        <div class="form-group">
                            <label data-translate="projectDescAr">الوصف (عربي)</label>
                            <textarea id="projectDescAr" required></textarea>
                        </div>
                        <div class="form-group">
                            <label data-translate="projectDescEn">الوصف (إنجليزي)</label>
                            <textarea id="projectDescEn" required></textarea>
                        </div>
                        <div class="form-group">
                            <label data-translate="projectImage">رابط الصورة</label>
                            <input type="url" id="projectImage" value="https://via.placeholder.com/400x200/1e3a8a/ffffff?text=Project" required>
                        </div>
                        <div class="form-group">
                            <label data-translate="projectTech">التقنيات (مفصولة بفواصل)</label>
                            <input type="text" id="projectTech" placeholder="HTML, CSS, JavaScript" required>
                        </div>
                        <button type="submit" class="btn btn-primary" data-translate="add">إضافة</button>
                    </form>
                </div>
                
                <div id="adminProjectsList" class="projects-list"></div>
            </div>
            
            <div id="messages-tab" class="tab-content">
                <div id="adminMessagesList" class="messages-list"></div>
            </div>
        </div>
    </main>
    
    <!-- Modal for Edit Project -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 <span data-translate="allRights">جميع الحقوق محفوظة</span></p>
        </div>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
