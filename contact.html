<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - معرض أعمالي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">MyPortfolio</a>
                </div>
                
                <div class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </div>
                
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html" data-translate="home">الرئيسية</a></li>
                    <li><a href="about.html" data-translate="about">نبذة عني</a></li>
                    <li><a href="index.html#projects" data-translate="projects">المشاريع</a></li>
                    <li><a href="contact.html" data-translate="contact">اتصل بنا</a></li>
                    <li class="mobile-only">
                        <div class="theme-toggler">
                            <button class="theme-btn active" onclick="toggleTheme('light')" data-translate="light">فاتح</button>
                            <button class="theme-btn" onclick="toggleTheme('dark')" data-translate="dark">مظلم</button>
                        </div>
                    </li>
                    <li class="mobile-only">
                        <div class="lang-switcher">
                            <button class="lang-btn active" onclick="changeLanguage('ar')">العربية</button>
                            <button class="lang-btn" onclick="changeLanguage('en')">English</button>
                        </div>
                    </li>
                </ul>
                
                <div class="header-controls">
                    <div class="theme-toggler desktop-only">
                        <button class="theme-btn active" onclick="toggleTheme('light')" data-translate="light">فاتح</button>
                        <button class="theme-btn" onclick="toggleTheme('dark')" data-translate="dark">مظلم</button>
                    </div>
                    
                    <div class="lang-switcher desktop-only">
                        <button class="lang-btn active" onclick="changeLanguage('ar')">العربية</button>
                        <button class="lang-btn" onclick="changeLanguage('en')">English</button>
                    </div>
                    
                    <div class="auth-buttons" id="authButtons"></div>
                </div>
            </div>
        </div>
    </header>
    
    <main>
        <section class="contact-section">
            <div class="container">
                <h2 class="section-title" data-translate="contactMe">تواصل معي</h2>
                
                <div class="contact-wrapper">
                    <div class="contact-info">
                        <h3 data-translate="contactInfo">معلومات الاتصال</h3>
                        <p data-translate="contactInfoDesc">يمكنك التواصل معي عبر</p>
                        
                        <div class="info-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>القاهرة، مصر</span>
                        </div>
                        
                        <div class="info-item">
                            <i class="fas fa-phone-alt"></i>
                            <span>+20 123 456 7890</span>
                        </div>
                        
                        <div class="info-item">
                            <i class="fas fa-envelope"></i>
                            <span>ahmed@example.com</span>
                        </div>
                        
                        <div class="social-links">
                            <a href="#"><i class="fab fa-facebook-f"></i></a>
                            <a href="#"><i class="fab fa-twitter"></i></a>
                            <a href="#"><i class="fab fa-linkedin-in"></i></a>
                            <a href="#"><i class="fab fa-github"></i></a>
                        </div>
                    </div>
                    
                    <div class="contact-form">
                        <h3 data-translate="sendMessage">أرسل لي رسالة</h3>
                        
                        <form id="contactForm">
                            <div class="form-group">
                                <label for="name" data-translate="yourName">الاسم</label>
                                <input type="text" id="name" name="name" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="email" data-translate="yourEmail">البريد الإلكتروني</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="phone" data-translate="phone">رقم الهاتف</label>
                                <input type="tel" id="phone" name="phone">
                            </div>
                            
                            <div class="form-group">
                                <label for="subject" data-translate="subject">الموضوع</label>
                                <input type="text" id="subject" name="subject">
                            </div>
                            
                            <div class="form-group">
                                <label for="message" data-translate="message">الرسالة</label>
                                <textarea id="message" name="message" rows="5" required></textarea>
                            </div>
                            
                            <button type="submit" class="btn btn-primary" data-translate="send">إرسال</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 <span data-translate="allRights">جميع الحقوق محفوظة</span></p>
        </div>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
